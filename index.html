<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR Menu</title>
    <!-- A-Frame and MindAR for Universal Fallback - Loading in head with defer to prevent blocking -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js" defer></script>
    <style>
      body, html { margin: 0; padding: 0; background: #000; color: #fff; height: 100%; overflow: hidden; fill: #000; }
      #root { height: 100%; }
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 9999;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader">
        <div style="text-align: center;">
          <div style="width: 24px; height: 24px; border: 2px solid #333; border-top-color: #F27D26; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px auto;"></div>
          <p id="loader-text" style="font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #666;">Loading Menu...</p>
        </div>
      </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
